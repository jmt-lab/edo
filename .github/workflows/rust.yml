name: Rust
permissions:
  contents: read
on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - "**.md"
      - ".github/dependabot.yml"
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - "**.md"
      - ".github/dependabot.yml"
env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - run: cargo install cargo-deny --locked
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --all --verbose
    - run: cargo deny check all
